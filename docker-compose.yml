version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: hiring-screener-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hiring-screener-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
    volumes:
      - chroma_data:/app/chroma_data
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
  chroma_data:
